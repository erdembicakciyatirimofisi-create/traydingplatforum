workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    scripts:
      - name: List all files in repository
        script: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== All files in repository ==="
          ls -la
          echo ""
          echo "=== Xcode project files ==="
          find . -name "*.xcodeproj" -type d
          echo ""
          echo "=== Xcode workspace files ==="
          find . -name "*.xcworkspace" -type d
          echo ""
          echo "=== Top level directories ==="
          ls -la