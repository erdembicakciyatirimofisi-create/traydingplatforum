workflows:
  TradingPlatform-iOS-Build:
    name: TradingPlatform iOS Build
    environment:
      vars:
        BUNDLE_ID: "co.median.ios.bnkzmeo"
        XCODE_PROJECT: "TradingPlatform.xcodeproj"
        XCODE_SCHEME: "TradingPlatform"
      xcode: latest
    scripts:
      - name: Set Bundle ID
        script: |
          find . -name "*.plist" -exec /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" {} \; 2>/dev/null || true
      - name: Build IPA
        script: |
          xcodebuild clean build archive -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -archivePath build/App.xcarchive
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportPath build -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/*.ipa
    publishing:
      scripts:
        - name: Export IPA with automatic signing
          script: |
            /usr/libexec/PlistBuddy -c "Add :method string development" exportOptions.plist
            /usr/libexec/PlistBuddy -c "Add :signingStyle string automatic" exportOptions.plist
            /usr/libexec/PlistBuddy -c "Add :teamID string 5A6E7H8K9L" exportOptions.plist