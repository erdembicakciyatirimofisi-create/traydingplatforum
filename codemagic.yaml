workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    scripts:
      - name: Build iOS App
        script: |
          echo "=== Building TradingPlatform iOS App ==="
          echo "Using workspace: TradingPlatform.xcworkspace"
          echo "Using scheme: TradingPlatform"
          echo ""
          
          xcodebuild build \
            -workspace "TradingPlatform.xcworkspace" \
            -scheme "TradingPlatform" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/*.xcresult
    
    publishing:
      email:
        recipients:
          - erdembicakciyatirimofisi@gmail.com
        notify:
          success: true
          failure: true