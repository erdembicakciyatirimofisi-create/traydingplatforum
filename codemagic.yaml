workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "TradingPlatform.xcworkspace"
        XCODE_SCHEME: "LeanIOS"
    scripts:
      - name: Install Tuist
        script: |
          if ! command -v tuist &> /dev/null; then
            curl -Ls https://install.tuist.io | bash
          fi
          tuist version
      
      - name: Generate Project with Tuist
        script: |
          tuist generate
      
      - name: Build iOS App (No Code Signing)
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
    
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/*.xcresult
    
    publishing:
      email:
        recipients:
          - erdembicakciyatirimofisi@gmail.com
        notify:
          success: true
          failure: true