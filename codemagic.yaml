workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "TradingPlatform.xcworkspace"
        XCODE_SCHEME: "LeanIOS"
    scripts:
      - name: Install Tuist and Build
        script: |
          # Tuist'i yükle
          curl -Ls https://install.tuist.io | bash
          
          # Tuist'in yüklendiği yolu bul
          TUIST_PATH="$HOME/.tuist/bin/tuist"
          
          # Eğer normal yolda yoksa, farklı yerlerde ara
          if [ ! -f "$TUIST_PATH" ]; then
            TUIST_PATH=$(find ~ -name "tuist" -type f 2>/dev/null | head -1)
          fi
          
          echo "Tuist path: $TUIST_PATH"
          
          # Tuist ile projeyi oluştur
          if [ -f "$TUIST_PATH" ]; then
            $TUIST_PATH generate
          else
            echo "Tuist not found, trying with mise..."
            curl https://mise.run | sh
            export PATH="$HOME/.local/bin:$PATH"
            mise use -g tuist@latest
            mise install tuist@latest
            export PATH="$HOME/.local/share/mise/installs/tuist/latest/bin:$PATH"
            tuist generate
          fi
          
          # Build işlemi
          xcodebuild build \
            -workspace "TradingPlatform.xcworkspace" \
            -scheme "LeanIOS" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
    
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/*.xcresult
    
    publishing:
      email:
        recipients:
          - erdembicakciyatirimofisi@gmail.com
        notify:
          success: true
          failure: true