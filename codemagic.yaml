workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "TradingPlatform.xcworkspace"
        XCODE_SCHEME: "LeanIOS"
    scripts:
      - name: Build iOS App
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/*.xcresult
    
    publishing:
      email:
        recipients:
          - erdembicakciyatirimofisi@gmail.com
        notify:
          success: true
          failure: true