workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    scripts:
      - name: Install Tuist and Generate Project
        script: |
          echo "=== Installing Tuist ==="
          curl -Ls https://install.tuist.io | bash
          export PATH="$HOME/.tuist/bin:$PATH"
          
          echo "=== Tuist version ==="
          tuist version
          
          echo "=== Generating Xcode project with Tuist ==="
          tuist generate
          
          echo "=== Checking generated files ==="
          ls -la Derived/Sources/ || echo "Derived/Sources not found, checking..."
          find . -name "Tuist*.swift" -type f
          
      - name: Build iOS App
        script: |
          export PATH="$HOME/.tuist/bin:$PATH"
          
          echo "=== Building with xcodebuild ==="
          xcodebuild build \
            -workspace "TradingPlatform.xcworkspace" \
            -scheme "TradingPlatform" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/*.xcresult
    
    publishing:
      email:
        recipients:
          - erdembicakciyatirimofisi@gmail.com
        notify:
          success: true
          failure: true