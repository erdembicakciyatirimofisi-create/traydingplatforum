workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    scripts:
      - name: Build iOS App
        script: |
          echo "=== Building TradingPlatform iOS App ==="
          echo "Available workspaces:"
          ls -la *.xcworkspace
          echo ""
          echo "Building with xcodebuild..."
          xcodebuild build \
            -workspace "TradingPlatform.xcworkspace" \
            -scheme "LeanIOS" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -quiet || echo "Build failed, showing errors:"
    
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/*.xcresult
    
    publishing:
      email:
        recipients:
          - erdembicakciyatirimofisi@gmail.com
        notify:
          success: true
          failure: true