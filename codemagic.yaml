workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    scripts:
      - name: Build iOS App
        script: |
          xcodebuild build \
            -workspace "TradingPlatform.xcworkspace" \
            -scheme "TradingPlatform" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO