workflows:
  ios-workflow:
    name: TradingPlatform iOS Build
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: "co.median.ios.bnkzmeo"
    scripts:
      - name: Archive and Export IPA
        script: |
          xcodebuild archive \
            -workspace "TradingPlatform.xcworkspace" \
            -scheme "TradingPlatform" \
            -archivePath build/TradingPlatform.xcarchive \
            CODE_SIGNING_ALLOWED=NO
          
          xcodebuild -exportArchive \
            -archivePath build/TradingPlatform.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO || true
          
          ls -la build/ipa/
    artifacts:
      - build/ipa/*.ipa
      - build/TradingPlatform.xcarchive
